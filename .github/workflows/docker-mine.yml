name: Build my image (GHCR only)

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像 tag（默认 latest）"
        required: false
        default: "latest"

jobs:
  build:
    name: Build & push to GHCR (amd64)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version & repo
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="latest"; fi
          echo "$TAG-$(git rev-parse --short HEAD)" > VERSION
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push tiler
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push pmtiles-sync
        uses: docker/build-push-action@v6
        with:
          context: pmtiles-sync
          file: pmtiles-sync/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/pmtiles-sync:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=pmtiles-sync
          cache-to: type=gha,mode=max,scope=pmtiles-sync

      - name: Build & push proxy
        uses: docker/build-push-action@v6
        with:
          context: proxy
          file: proxy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/proxy:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy

      - name: Summary
        run: |
          echo "### 拉取地址" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ steps.meta.outputs.repo }}/pmtiles-sync:${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ steps.meta.outputs.repo }}/proxy:${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
